# Source: teleport-cluster/templates/auth/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: teleport-cluster-auth
  namespace: teleport
  labels:
    app.kubernetes.io/name: 'teleport-cluster'
    app.kubernetes.io/instance: 'teleport-cluster'
    app.kubernetes.io/component: 'auth'
    helm.sh/chart: 'teleport-cluster-18.9.1'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/version: '18.9.1'
    teleport.dev/majorVersion: '18'
data:
  apply-on-startup.yaml: |2
    ---
    kind: token
    version: v2
    metadata:
      name: teleport-cluster-proxy
      expires: "2050-01-01T00:00:00Z"
    spec:
      roles: [Proxy]
      join_method: kubernetes
      kubernetes:
        allow:
          - service_account: "teleport:teleport-cluster-proxy"
  teleport.yaml: |2
    auth_service:
      authentication:
        local_auth: true
        second_factors:
        - otp
        - webauthn
        type: local
        webauthn:
          rp_id: teleport.local
      cluster_name: teleport.local
      enabled: true
      proxy_listener_mode: multiplex
    kubernetes_service:
      enabled: true
      kube_cluster_name: teleport.local
      listen_addr: 0.0.0.0:3026
      public_addr: teleport-cluster-auth.teleport.svc.cluster.local:3026
    proxy_service:
      enabled: false
    ssh_service:
      enabled: false
    teleport:
      auth_server: 127.0.0.1:3025
      log:
        format:
          extra_fields:
          - timestamp
          - level
          - component
          - caller
          output: text
        output: stderr
        severity: INFO
    version: v3
