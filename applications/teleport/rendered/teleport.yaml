              app.kubernetes.io/instance: 'teleport-cluster'
              app.kubernetes.io/component: 'auth'
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: 'teleport-cluster'
              app.kubernetes.io/instance: 'teleport-cluster'
              app.kubernetes.io/component: 'auth'
      affinity:
        podAntiAffinity:
      containers:
      - name: "teleport"
        image: 'public.ecr.aws/gravitational/teleport-distroless:18.9.1'
        imagePullPolicy: IfNotPresent
        args:
        - "--diag-addr=0.0.0.0:3000"
        - "--apply-on-startup=/etc/teleport/apply-on-startup.yaml"
        ports:
        - name: diag
          containerPort: 3000
          protocol: TCP
        - name: auth
          containerPort: 3025
          protocol: TCP
        - name: kube
          containerPort: 3026
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: diag
          initialDelaySeconds: 5 # wait 5s for agent to start
          periodSeconds: 5 # poll health every 5s
          failureThreshold: 6 # consider agent unhealthy after 30s (6 * 5s)
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: diag
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
          successThreshold: 1
          timeoutSeconds: 5
